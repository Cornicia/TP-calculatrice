<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @font-face {
            font-family: calco; /* set name */
            src: url(technology/Technology.ttf); /* url of the font */
        }

        .coque {
            margin: auto;
            width: 400px;
            height: 750px;
            background-image: url('coque.png');
            background-size: 525px 850px;
            background-position: center;
            background-repeat: no-repeat;
            overflow: visible;
            position: relative;
            border: 3px solid #c65528;
        }

        .screen-box {
            margin-top: 47px;
            margin-inline: auto;
            width: 320px;
            display: block;
            height: 100px;
            border: 2px double #575757;
        }

        .screen {
            font-family: calco, sans-serif;
            font-size: 7.3rem;
            text-align: right;
            width: 320px;
            display: block;
            height: 100px;
            border: 2px double #575757;
        }

        .screen.on {
            background-color: #6b9b5d;
        }
        
        .screen.off {
            background-color: #575757;
        }
        
        .power-control-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-inline: auto;
            width: 340px;
            height: 100px;
            background-color: rgb(58, 55, 55);
        }

        .power-button{
            width: 45px;
            height: 30px;
            background-color: #c65528;
            border-radius: 70%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
        }
        
        .middle-control {
            width: 105px;
            height: 90px;
            border-radius: 50%;
            background-color: #c65528;
        }
    </style>
</head>

<body>
    <main>
        <div class="coque">
            <div class="screen-box">
                <div id="screen" class="screen"></div>
            </div>

            <div class="power-control-box">
                <button id="1" class="power-button one">1</button>
                <button id="2" class="power-button two">2</button>
                <div class="middle-control"></div>
                <div class="power-button">X</div>
                <button id="power-button" class="power-button">ON</button>
            </div>
        </div>
    </main>

    <script type="module" src="dist/ui.js"></script>
    <script type="module" src="dist/screen.js"></script>
    <script type="module" src="dist/state.js"></script>
    <script type="module" src="dist/main.js"></script>
</body>

</html>
